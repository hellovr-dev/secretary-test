<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업무 프로세스 다이어그램</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 0 20px;
    }

    /* ── 공통 네비게이션 ── */
    .site-nav { position: sticky; top: 0; z-index: 999; background: rgba(15,15,35,0.88); border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 2px 16px rgba(0,0,0,0.25); margin: 0 -20px; }
    .site-nav ul { display: flex; list-style: none; max-width: 1320px; margin: 0 auto; padding: 0 32px; }
    .site-nav li { flex: 1; }
    .site-nav a { display: block; padding: 14px 20px; text-align: center; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.88rem; font-weight: 600; border-bottom: 3px solid transparent; transition: color .2s, border-color .2s, background .2s; }
    .site-nav a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .site-nav a.active { color: #7c9fff; border-bottom-color: #7c9fff; background: rgba(124,159,255,0.08); }

    .page-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 0 60px;
    }

    .page-title {
      text-align: center;
      color: #fff;
      margin-bottom: 40px;
    }

    .page-title h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .page-title p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.75);
    }

    .diagram-card {
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .diagram-card svg {
      width: 100%;
      max-width: 800px;
      height: auto;
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <ul>
    <li><a href="dashboard.html">📊 대시보드</a></li>
    <li><a href="chart.html">📈 매출 현황</a></li>
    <li><a href="diagram.html">🔄 업무 프로세스</a></li>
    <li><a href="report.html">📋 사이트 분석</a></li>
  </ul>
</nav>

<div class="page-wrap">

  <div class="page-title">
    <h1>🔄 업무 프로세스</h1>
    <p>기획부터 분석까지 5단계 업무 흐름</p>
  </div>

  <div class="diagram-card">
    <svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <polygon points="0 0, 10 3, 0 6" fill="#ccc"/>
        </marker>
      </defs>

      <!-- 1단계: 기획 -->
      <rect x="20" y="50" width="120" height="100" rx="12" fill="#c5e4f3" stroke="#5ba3d0" stroke-width="2"/>
      <text x="80" y="95" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2c5aa0">기획</text>
      <text x="80" y="115" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" text-anchor="middle" fill="#5b82b0">Planning</text>

      <!-- 화살표 1 -->
      <line x1="145" y1="100" x2="175" y2="100" stroke="#ccc" stroke-width="2" marker-end="url(#arrowhead)"/>

      <!-- 2단계: 제작 -->
      <rect x="180" y="50" width="120" height="100" rx="12" fill="#c1f0d1" stroke="#52b788" stroke-width="2"/>
      <text x="240" y="95" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2d6a4f">제작</text>
      <text x="240" y="115" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" text-anchor="middle" fill="#52b788">Production</text>

      <!-- 화살표 2 -->
      <line x1="305" y1="100" x2="335" y2="100" stroke="#ccc" stroke-width="2" marker-end="url(#arrowhead)"/>

      <!-- 3단계: 검토 -->
      <rect x="340" y="50" width="120" height="100" rx="12" fill="#e8d5f2" stroke="#b195c4" stroke-width="2"/>
      <text x="400" y="95" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#5a3d6f">검토</text>
      <text x="400" y="115" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" text-anchor="middle" fill="#b195c4">Review</text>

      <!-- 화살표 3 -->
      <line x1="465" y1="100" x2="495" y2="100" stroke="#ccc" stroke-width="2" marker-end="url(#arrowhead)"/>

      <!-- 4단계: 배포 -->
      <rect x="500" y="50" width="120" height="100" rx="12" fill="#f5d9c3" stroke="#e8a76a" stroke-width="2"/>
      <text x="560" y="95" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#b85c2a">배포</text>
      <text x="560" y="115" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" text-anchor="middle" fill="#e8a76a">Deploy</text>

      <!-- 화살표 4 -->
      <line x1="625" y1="100" x2="655" y2="100" stroke="#ccc" stroke-width="2" marker-end="url(#arrowhead)"/>

      <!-- 5단계: 분석 -->
      <rect x="660" y="50" width="120" height="100" rx="12" fill="#f5d4e5" stroke="#d896c8" stroke-width="2"/>
      <text x="720" y="95" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#a83e5f">분석</text>
      <text x="720" y="115" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" text-anchor="middle" fill="#d896c8">Analysis</text>
    </svg>
  </div>

</div>

<script>
  (function() {
    var page = location.pathname.split('/').pop() || 'dashboard.html';
    document.querySelectorAll('.site-nav a').forEach(function(a) {
      if (a.getAttribute('href') === page) a.classList.add('active');
    });
  })();
</script>

</body>
</html>
